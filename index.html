<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Converssor</title>
</head>

<body>
    <img src="assets/logo.gif" alt="Logo-do-Converssor" class="logo">

    <main>
        <label>
            Converter <b>de</b>
            <select id="currency-select-top">
                <option value="real">R$ Real brasileiro</option>
                <option value="dolar">US$ Dólar americano</option>
                <option value="euro">€ Euro</option>
                <option value="libra">£ Libra esterlina</option>
                <option value="bitcoin">₿ Bitcoin</option>
            </select>
        </label>

        <label>
            Converter <b>para</b>
            <select id="currency-select">
                <option value="dolar">US$ Dólar americano</option>
                <option value="euro">€ Euro</option>
                <option value="libra">£ Libra esterlina</option>
                <option value="bitcoin">₿ Bitcoin</option>
                <option value="real">R$ Real brasileiro</option>
            </select>
        </label>


        <label>
            Valor
            <input type="number" placeholder="R$ 10.000,00">
        </label>

        <button class="conver-button">Converter</button>

        <section>
            <div class="currency-box">
                <img class="currency-image-top" src="assets/brasil 2.png" alt="Bandeira do Brasil">
                <p class="currency" id="currency-name-top">Real</p>
                <p class="currency-value-to-convert">R$ 0</p>
            </div>

            <img src="./assets/Vector.png" alt="Seta de Conversão" class="arrow-img">

            <div  class="currency-box">
                <img class="currency-image" src="assets/dolar.png" alt="Bandeira do Dólar">
                <p class="currency" id="currency-name">Dólar</p>
                <p class="currency-value">US$ 0</p>
            </div>
        </section>

    </main>

</body>

<script src="script.js"></script>

</html>
